{% macro render_pagination(pagination, url_route) %}

    <ul class="pagination justify-content-center">
        <li class="page-item"><a class="page-link" href="{{ url_for(url_route, page=1) }}">首页</a></li>
        
        {% if pagination.has_prev %}
            <li class="page-item"><a href="{{ url_for(url_route, page=pagination.prev_num) }}" class="page-link">上一页</a></li>
        {% endif %}

        {% if pagination.has_next %}
            <li class="page-item"><a href="{{ url_for(url_route, page=pagination.next_num) }}" class="page-link">下一页</a></li>
        {% endif %}

        <li class="page-item"><a class="page-link" href="{{ url_for(url_route, page=pagination.pages) }}">尾页</a></li>

    </ul>
{% endmacro %}
